name: Daily Price Update

on:
  schedule:
    - cron: '0 22 * * *'   # 每天 22:00 UTC = 06:00 台灣時間（UTC+8）
  workflow_dispatch:         # 手動觸發（網頁按鈕 or GitHub Actions 頁面）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch model pricing
        run: python scripts/fetch_models.py

      - name: Fetch rankings
        run: python scripts/fetch_rankings.py

      - name: Build models.json
        run: python scripts/build_json.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models.json
          git diff --cached --quiet || git commit -m "chore: daily price update $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') TW"
          git push
